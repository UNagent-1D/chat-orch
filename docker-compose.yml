# Docker Compose for local development and integration testing.
#
# Services:
#   chat-orch          — Rust orchestrator (webhooks, routing, pipeline)
#   redis              — session store + dedup (shared: DB 0 = orch, DB 1 = conversation-chat)
#   caddy              — TLS reverse proxy (for Telegram webhooks)
#   swagger-ui         — interactive API docs (http://localhost:8090)
#
#   ── Real Go microservices ──
#   tenant-service     — Go Tenant Service (auth, RBAC, JWT) — PostgreSQL-backed
#   conversation-chat  — Go conversation handler (sessions, LLM, escalation) — MongoDB + Redis
#   postgres           — PostgreSQL for tenant-service
#   mongo              — MongoDB for conversation-chat
#
#   ── Mock services (still needed) ──
#   tenant-mock        — Python mock with full Tenant API (chat-orch + conversation-chat use this
#                        because the real Tenant Service doesn't yet have /api/v1/tenants/:id,
#                        /profiles, /data-sources, or /internal/resolve-channel endpoints)
#   acr-mock           — Python mock of Agent Config Registry (no real ACR repo exists yet)
#   graph-mock         — Python mock of WhatsApp/Telegram/Hospital APIs
#
# Prerequisites:
#   Run ./scripts/clone-services.sh to clone Go repos into .dev/services/
#
# Usage:
#   docker compose up --build          # Start everything
#   docker compose up redis postgres   # Just databases (for local Go/Rust dev)
#   docker compose logs -f chat-orch   # Follow orchestrator logs
#   open http://localhost:8090         # Swagger UI
#
# To reset databases (re-run init/seed scripts):
#   docker compose down -v && docker compose up --build

services:

  # ═══════════════════════════════════════════════════════════════════════
  # Core: Rust Orchestrator
  # ═══════════════════════════════════════════════════════════════════════

  chat-orch:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      # chat-orch still uses tenant-mock because the real Tenant Service
      # does not yet have the endpoints the orchestrator needs:
      #   - GET /internal/resolve-channel
      #   - GET /api/v1/tenants/:id
      #   - GET /api/v1/tenants/:id/profiles
      #   - GET /api/v1/tenants/:id/data-sources
      # When those are implemented, change this to http://tenant-service:8080
      TENANT_SERVICE_URL: http://tenant-mock:3001
      ACR_SERVICE_URL: http://acr-mock:3002
      # Ollama running natively on macOS (Apple GPU). The model name comes
      # from the ACR mock config (llm_params.model = "qwen2.5:7b").
      OPENAI_BASE_URL: http://host.docker.internal:11434/v1
      OPENAI_API_KEY: ollama
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
    depends_on:
      redis:
        condition: service_healthy
      tenant-mock:
        condition: service_started
      acr-mock:
        condition: service_started
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════
  # Databases
  # ═══════════════════════════════════════════════════════════════════════

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Schema init (from Tenant repo) + seed data — runs ONCE on first volume creation.
      # To re-seed: docker compose down -v
      - ./.dev/services/tenant/sql/init_schema.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./docker/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: conversatory
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongo-data:/data/db

  # ═══════════════════════════════════════════════════════════════════════
  # Real Go Microservices
  # ═══════════════════════════════════════════════════════════════════════

  tenant-service:
    build:
      context: ./.dev/services/tenant
      dockerfile: ../../../docker/tenant.Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "host=postgres port=5432 user=postgres password=admin dbname=postgres sslmode=disable"
      JWT_SECRET: "super-secreto-cambiar-en-produccion"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  conversation-chat:
    build:
      context: ./.dev/services/conversation-chat
      dockerfile: ../../../docker/conversation-chat.Dockerfile
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: "8082"
      APP_VERSION: "1.0.0"
      GIN_MODE: "debug"
      # Redis DB 1 — isolated from chat-orch which uses DB 0
      REDIS_URL: "redis://redis:6379/1"
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: "conversatory"
      # conversation-chat calls tenant-mock (not real tenant-service) because
      # the real Tenant Service lacks /api/v1/tenants/:id, /profiles, /data-sources.
      TENANT_SERVICE_URL: "http://tenant-mock:3001"
      ACR_SERVICE_URL: "http://acr-mock:3002"
      AUTH_SERVICE_URL: "http://tenant-service:8080/auth"
      # AUTH_STUB=true bypasses the auth service call (no /validate endpoint yet).
      # When the Tenant Service adds /validate, set this to false.
      AUTH_STUB: "true"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      DEFAULT_IDLE_TIMEOUT_SECONDS: "300"
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      tenant-mock:
        condition: service_started
      acr-mock:
        condition: service_started
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════
  # Mock Services (kept until real services implement all needed endpoints)
  # ═══════════════════════════════════════════════════════════════════════

  tenant-mock:
    image: python:3.12-slim
    working_dir: /app
    command: python app.py
    ports:
      - "3001:3001"
    volumes:
      - ./mock-services/tenant-service:/app:ro
    environment:
      PORT: "3001"

  acr-mock:
    image: python:3.12-slim
    working_dir: /app
    command: python app.py
    ports:
      - "3002:3002"
    volumes:
      - ./mock-services/acr-service:/app:ro
    environment:
      PORT: "3002"

  graph-mock:
    image: python:3.12-slim
    working_dir: /app
    command: python app.py
    ports:
      - "3003:3003"
    volumes:
      - ./mock-services/graph-api:/app:ro
    environment:
      PORT: "3003"

  # ═══════════════════════════════════════════════════════════════════════
  # Infrastructure
  # ═══════════════════════════════════════════════════════════════════════

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    ports:
      # Moved from 8080 to 8090 — port 8080 is now used by tenant-service
      - "8090:8080"
    volumes:
      - ./docs/openapi.yaml:/app/openapi.yaml:ro
    environment:
      SWAGGER_JSON: /app/openapi.yaml
    depends_on:
      - chat-orch

  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - chat-orch

volumes:
  redis-data:
  postgres-data:
  mongo-data:
  caddy-data:
  caddy-config:
